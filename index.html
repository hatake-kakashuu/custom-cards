<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Levi Card Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#2b1055);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff4ecd;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #ff1493;
}

.status {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

</style>
</head>
<body>

<div class="box">
<h2>Create Card JSON</h2>
<input type="text" id="name" placeholder="Enter Card Name" required>
<input type="text" id="image" placeholder="Paste Image URL" required>
<input type="text" id="description" placeholder="Enter Description" required>
<input type="text" id="tier" placeholder="Enter Tier" required>
<input type="text" id="creators" placeholder="Enter Creators" required>
<button onclick="createCard()">Create Card</button>
<div class="status" id="status"></div>
</div>

<script>

async function createCard() {

  const status = document.getElementById("status")
  status.innerText = "Creating card..."

  const response = await fetch("/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      image: document.getElementById("image").value,
      description: document.getElementById("description").value,
      tier: document.getElementById("tier").value,
      creators: document.getElementById("creators").value
    })
  })

  const data = await response.json()

  if (data.url) {
    window.location.href = data.url
  } else {
    status.innerText = "Error creating card"
  }
}

</script>

</body>
</html>
